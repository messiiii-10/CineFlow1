<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1350" role="img" aria-labelledby="title desc">
  <title id="title">Death Note poster</title>
  <desc id="desc">Dark manga-inspired poster for Death Note with notebook, apple and dramatic typography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="55%" stop-color="#151922"/>
      <stop offset="100%" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f0e4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#aab4c9" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#f5f0dd" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#d9d1b7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0b0d12" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="900" height="1350" fill="url(#bg)"/>
  <rect width="900" height="1350" fill="url(#moon)"/>

  <g opacity="0.22" stroke="#d8e0f0" stroke-width="2">
    <path d="M90 140 L780 1130"/>
    <path d="M-20 280 L650 1300"/>
    <path d="M260 60 L900 1010"/>
    <path d="M30 640 L860 230"/>
    <path d="M20 890 L840 500"/>
    <path d="M180 1220 L880 800"/>
  </g>

  <g transform="translate(95 265) rotate(-8)" filter="url(#shadow)">
    <rect x="0" y="0" width="430" height="590" rx="16" fill="#111317" stroke="#b7c0cf" stroke-opacity="0.25"/>
    <rect x="24" y="22" width="382" height="546" rx="8" fill="#171b21" stroke="#f5f0dd" stroke-opacity="0.08"/>
    <text x="215" y="120" fill="#f5f0dd" font-family="Georgia, serif" font-size="72" text-anchor="middle" letter-spacing="12">DEATH</text>
    <text x="215" y="205" fill="#f5f0dd" font-family="Georgia, serif" font-size="72" text-anchor="middle" letter-spacing="12">NOTE</text>
    <g fill="none" stroke="#8a95a8" stroke-opacity="0.28">
      <path d="M58 286 H372"/>
      <path d="M58 338 H372"/>
      <path d="M58 390 H372"/>
      <path d="M58 442 H372"/>
      <path d="M58 494 H372"/>
    </g>
  </g>

  <g transform="translate(515 770)" filter="url(#shadow)">
    <circle cx="78" cy="70" r="70" fill="#a80f18"/>
    <ellipse cx="54" cy="38" rx="24" ry="13" fill="#ffb7bc" opacity="0.7"/>
    <path d="M148 48 C190 8 232 36 222 92 C212 145 162 177 132 203 C116 171 126 104 148 48 Z" fill="#d8d0bc"/>
    <path d="M154 61 C186 38 204 54 194 82" fill="none" stroke="#a69a84" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g transform="translate(505 245)" opacity="0.85">
    <path d="M146 0 C198 67 225 174 194 258 C252 236 310 189 337 122 C340 211 292 306 198 353 C258 372 314 363 360 335 C315 417 224 472 123 470 C54 468 8 434 0 404 C52 420 100 421 140 411 C75 370 38 295 44 214 C72 247 99 267 132 279 C99 205 103 93 146 0 Z" fill="url(#glow)" opacity="0.35"/>
  </g>

  <g transform="translate(80 1000)">
    <text x="0" y="0" fill="#ece6d6" font-family="Georgia, serif" font-size="118" font-style="italic" letter-spacing="5">Death Note</text>
    <rect x="4" y="26" width="360" height="6" rx="3" fill="#a80f18"/>
    <text x="0" y="86" fill="#98a3b8" font-family="Arial, sans-serif" font-size="28" letter-spacing="6">PSIKOLOJIK GERILIM</text>
  </g>
</svg>
