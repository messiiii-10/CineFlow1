<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1350" role="img" aria-labelledby="title desc">
  <title id="title">JoJo's Bizarre Adventure poster</title>
  <desc id="desc">Bold manga-inspired poster for JoJo's Bizarre Adventure with speed lines and striking title treatment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0d1734"/>
      <stop offset="45%" stop-color="#10345c"/>
      <stop offset="100%" stop-color="#31123b"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe898"/>
      <stop offset="100%" stop-color="#ff7b54"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffec8f"/>
      <stop offset="100%" stop-color="#ff8c47"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="1350" fill="url(#bg)"/>
  <circle cx="712" cy="238" r="142" fill="url(#sun)" opacity="0.92"/>

  <g opacity="0.28" stroke="#d7f2ff" stroke-width="3">
    <path d="M-20 1150 L690 160"/>
    <path d="M40 1310 L760 260"/>
    <path d="M160 1350 L820 360"/>
    <path d="M-30 910 L600 60"/>
    <path d="M190 1180 L900 170"/>
  </g>

  <g transform="translate(72 225)" filter="url(#shadow)">
    <polygon points="0,520 112,150 250,520" fill="#53d8e8"/>
    <polygon points="196,520 332,110 430,520" fill="#ff7ab6"/>
    <polygon points="366,520 534,68 640,520" fill="#ffe46d"/>
    <polygon points="534,520 716,155 804,520" fill="#87f9a5"/>
    <polygon points="86,520 202,248 278,520" fill="#132548"/>
    <polygon points="282,520 400,198 484,520" fill="#39164e"/>
    <polygon points="456,520 590,156 682,520" fill="#173b54"/>
    <polygon points="650,520 790,240 856,520" fill="#3d1d48"/>
  </g>

  <g transform="translate(85 160)">
    <text x="0" y="740" fill="#f6f8ff" font-family="Impact, Arial Black, sans-serif" font-size="104" letter-spacing="4">JOJO'S</text>
    <text x="0" y="845" fill="url(#titleFill)" stroke="#fff4cf" stroke-width="3" font-family="Impact, Arial Black, sans-serif" font-size="138" letter-spacing="3">BIZARRE</text>
    <text x="0" y="964" fill="url(#titleFill)" stroke="#fff4cf" stroke-width="3" font-family="Impact, Arial Black, sans-serif" font-size="138" letter-spacing="2">ADVENTURE</text>
    <text x="10" y="1032" fill="#c4d8ff" font-family="Arial, sans-serif" font-size="30" letter-spacing="7">ACTION • STYLE • GENERATIONS</text>
  </g>

  <g opacity="0.8" fill="#20153a">
    <path d="M692 227 C738 205 790 246 782 294 C771 360 726 404 706 450 C669 426 652 365 654 314 C656 281 668 251 692 227 Z"/>
    <circle cx="711" cy="290" r="16" fill="#ffe484"/>
    <circle cx="760" cy="275" r="12" fill="#ffe484"/>
  </g>

  <g fill="#b35cff" opacity="0.95" font-family="Impact, Arial Black, sans-serif" font-size="68">
    <text x="675" y="1040">ゴ</text>
    <text x="730" y="1110">ゴ</text>
    <text x="780" y="1185">ゴ</text>
  </g>
</svg>
